<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

AK Tiwari and Associates

</title>



<link
rel="stylesheet"
href="style.css">


<script
src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">

</script>


</head>




<body>




<div class="phone">



<!-- HEADER -->


<div class="header">


<div class="logo">

<img src="Screenshot_3.png" style="width:90px;">

</div>



<div>

<div class="title">

AK Tiwari And Associates

</div>


<div class="status">

🟢 Online

</div>


</div>



<button

class="endChatBtn"

onclick=
"clearChat()">

End Chat

</button>



</div>





<!-- CHAT -->


<div
id="chat">

</div>

<!-- INPUT -->


<div class="inputBox">


<button

class="voiceBtn"

onclick=
"startVoice()">

🎤

</button>



<input

id="msg"

placeholder=

<button

class=

onclick=
"sendMessage()">

➤

</button>



</div>











</div>









<div
id="popup"

class=
"popup">



<div
class=
"login-card">


<div class="login-logo">

</div>

AK Tiwari And Associates AI Chat Box

</h3>



<p>

Login to continue your legal consultation

</p>




<input

id="name"

placeholder=

"Enter your name">





<input

id="phone"

type="tel"

placeholder=

"Enter mobile number">





<button
onclick=
"submitLead()"

class=
"loginBtn">

Login

</button>




<div class="login-note">

🔒 Your details remain secure

</div>



</div>



</div>

src="script.js">
